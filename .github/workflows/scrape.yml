name: Daily Supabase Scraper

on:
  schedule:
    # Runs at 17:00 UTC every day, which is 00:00 WIB (Midnight Indonesia Time)
    - cron: '0 17 * * *'
  workflow_dispatch: # Allows you to manually trigger the script from the Actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Scraper Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scraper.py
